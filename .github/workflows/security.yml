name: Security Scanning

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Job 1: Python SAST with Bandit
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install bandit
      - run: bandit -r app/ -f json -o bandit-report.json --severity-level medium || true
      - run: bandit -r app/ --severity-level high  # Fail on HIGH severity
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # Job 2: Secret scanning with GitLeaks
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: Dependency vulnerability scanning
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install safety pip-audit
      - run: pip install -r requirements.txt
      - run: pip-audit --format json --output pip-audit-report.json || true
      # CVE-2024-23342: ecdsa timing attack — we use python-jose[cryptography] backend,
      # not the ecdsa backend. The ecdsa project has no planned fix.
      # GHSA-rf74-v2fm-23pw: nltk JSONTaggedDecoder recursion DoS — we don't pass untrusted
      # JSON to JSONTaggedDecoder. nltk is only used for text processing.
      # CVE-2026-33230: nltk WordNet Browser reflected XSS — we don't use the WordNet
      # Browser web UI at all.
      - run: pip-audit --desc --ignore-vuln CVE-2024-23342 --ignore-vuln GHSA-rf74-v2fm-23pw --ignore-vuln CVE-2026-33230
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  # Job 4: npm audit for frontend
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm ci
      - run: cd frontend && npm audit --audit-level=high || true
