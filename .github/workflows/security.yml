name: Security Scanning

on:
  schedule:
    - cron: '0 6 * * *'
  pull_request:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: security
  cancel-in-progress: true

jobs:
  # Job 1: Python SAST + dependency audit (consolidated)
  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run Bandit SAST (report)
        run: bandit -r app/ -f json -o bandit-report.json --severity-level medium || true
      - name: Run Bandit SAST (fail on HIGH)
        run: bandit -r app/ --severity-level high
      - name: Run pip-audit (report)
        run: pip-audit -r requirements.txt --format json --output pip-audit-report.json || true
      # CVE-2024-23342: ecdsa timing attack — we use python-jose[cryptography] backend,
      # not the ecdsa backend. The ecdsa project has no planned fix.
      # GHSA-rf74-v2fm-23pw: nltk JSONTaggedDecoder recursion DoS — we don't pass untrusted
      # JSON to JSONTaggedDecoder. nltk is only used for text processing.
      # CVE-2026-33230: nltk WordNet Browser reflected XSS — we don't use the WordNet
      # Browser web UI at all.
      # CVE-2026-33231: nltk WordNet Browser unauthenticated remote shutdown — same
      # component we don't use.
      # CVE-2026-4539: pygments ReDoS in lexer — local-only, low severity, no fix
      # available from pygments maintainers yet.
      - name: Run pip-audit (fail on vulnerabilities)
        run: pip-audit -r requirements.txt --desc --ignore-vuln CVE-2024-23342 --ignore-vuln GHSA-rf74-v2fm-23pw --ignore-vuln CVE-2026-33230 --ignore-vuln CVE-2026-33231 --ignore-vuln CVE-2026-4539
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  # Job 2: Secret scanning with GitLeaks
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: npm audit for frontend
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm audit --audit-level=high || true
