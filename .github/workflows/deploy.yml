name: Deploy to Cloud Run

on:
  # Deployment triggers:
  # - Scheduled: daily at 2 PM UTC (10 AM ET) — runs full test suite before deploying
  # - Manual: workflow_dispatch with profile selection (deploy-only or full)
  # Note: Push to master does NOT trigger deployment. Merge PRs, then either
  # wait for the daily schedule or manually dispatch from Actions tab.
  schedule:
    - cron: '0 14 * * *'  # Daily at 2 PM UTC (10 AM ET)
  workflow_dispatch:
    inputs:
      profile:
        description: 'Deploy profile'
        required: true
        default: 'deploy-only'
        type: choice
        options:
          - deploy-only
          - full
      branch:
        description: 'Branch to deploy (default: master)'
        required: false
        default: 'master'
        type: string

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  PROJECT_ID: emai-dev-01
  REGION: us-central1
  SERVICE: classbridge
  REPOSITORY: classbridge
  IMAGE: us-central1-docker.pkg.dev/emai-dev-01/classbridge/classbridge
  TESTING: "1"

jobs:
  rate-limit:
    runs-on: ubuntu-latest
    steps:
      - name: Check daily run count
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%dT00:00:00Z)
          COUNT=$(gh api "repos/${{ github.repository }}/actions/workflows/deploy.yml/runs?created=>=$TODAY&conclusion=success&per_page=100" --jq '.total_count')
          echo "Runs today: $COUNT"
          if [ "$COUNT" -ge 10 ]; then
            echo "::error::Daily limit of 10 automatic deploys reached. Use 'Run workflow' button for manual deploy."
            exit 1
          fi

  test:
    needs: [rate-limit]
    if: inputs.profile == 'full' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'master' }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest tests/ --tb=short -q -n auto --dist loadfile

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

  deploy:
    needs: [rate-limit, test]
    if: >-
      always() &&
      needs.rate-limit.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'master' }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

      - name: Detect database mode
        id: db-mode
        run: |
          # Check if Cloud SQL proxy annotation exists on the current service
          CLOUDSQL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format="value(spec.template.metadata.annotations['run.googleapis.com/cloudsql-instances'])" 2>/dev/null || echo "")
          if [[ -n "$CLOUDSQL" ]]; then
            echo "mode=cloudsql" >> "$GITHUB_OUTPUT"
            echo "Database mode: Cloud SQL (proxy: $CLOUDSQL)"
          else
            echo "mode=gce" >> "$GITHUB_OUTPUT"
            echo "Database mode: GCE self-hosted (no Cloud SQL proxy)"
          fi

      - name: Deploy to Cloud Run
        run: |
          # Build Cloud SQL flag only if currently using Cloud SQL
          CLOUDSQL_FLAG=""
          if [[ "${{ steps.db-mode.outputs.mode }}" == "cloudsql" ]]; then
            CLOUDSQL_FLAG="--add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:emai-db"
          fi

          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            $CLOUDSQL_FLAG \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=WARNING,LOG_TO_FILE=false,GOOGLE_REDIRECT_URI=https://www.classbridge.ca/api/google/callback,FRONTEND_URL=https://www.classbridge.ca,CANONICAL_DOMAIN=www.classbridge.ca,USE_GCS=true,GCS_BUCKET_NAME=classbridge-files,APP_VERSION=${{ github.sha }},GITHUB_TOKEN=${{ secrets.BUG_REPORT_GITHUB_TOKEN }},FROM_EMAIL=noreply@classbridge.ca" \
            --set-secrets "SECRET_KEY=SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,SENDGRID_API_KEY=SENDGRID_API_KEY:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASSWORD=SMTP_PASSWORD:latest,YOUTUBE_API_KEY=YOUTUBE_API_KEY:latest" \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --cpu-boost \
            --startup-probe httpGet.path=/health,initialDelaySeconds=5,periodSeconds=10,failureThreshold=24,timeoutSeconds=5 \
            --timeout 300

      - name: Show deployment URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "Deployed to: $URL"
