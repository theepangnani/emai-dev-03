<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassBridge — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #eef1f5;
      color: #1b1e2b;
      padding: 24px;
    }
    .offline-container {
      text-align: center;
      max-width: 420px;
    }
    .offline-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      color: #5b6274;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      background: #4a90d9;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #2d6eb5; }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">&#x1F4F6;</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features may be unavailable until you reconnect.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
